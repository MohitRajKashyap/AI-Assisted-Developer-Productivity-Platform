name: CI — AI Developer Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80
        env:
          DATABASE_URL: sqlite:///./test.db

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --timeout=30
        env:
          DATABASE_URL: sqlite:///./test_integration.db

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml

  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install black isort flake8

      - name: Check formatting (black)
        run: black --check backend/ tests/

      - name: Check imports (isort)
        run: isort --check-only backend/ tests/

      - name: Lint (flake8)
        run: flake8 backend/ --max-line-length=100 --ignore=E203,W503

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t ai-platform-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t ai-platform-frontend:${{ github.sha }} .

      - name: Test compose startup
        run: |
          docker compose up -d --wait || true
          sleep 5
          curl -f http://localhost:8000/health || echo "Backend health check (expected in CI)"
          docker compose down
        env:
          ANTHROPIC_API_KEY: ""
